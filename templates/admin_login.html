<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الإدارة - جرافيتي كود</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 80px; background-color: #343a40; color: white;">

    <h2>🔒 بوابة الإدارة والصيانة</h2>
    
    <form method="POST" style="margin-top: 30px; background: white; color: black; padding: 30px; width: 90%; max-width: 400px; margin-left: auto; margin-right: auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
        
        {% if error %}
            <div style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
                {{ error }}
            </div>
        {% endif %}

        <label style="display: block; font-size: 18px; margin-bottom: 10px; text-align: right; font-weight: bold;">اسم المستخدم:</label>
        <input type="text" name="username" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box;" placeholder="اكتب اسم المستخدم...">
        
        
        <label style="display: block; font-size: 18px; margin-bottom: 10px; text-align: right; font-weight: bold;">كلمة المرور:</label>
        <input type="password" name="password" required style="width: 100%; padding: 10px; margin-bottom: 30px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box;" placeholder="••••••••">
        
        <button type="submit" style="width: 100%; padding: 12px; background-color: #dc3545; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold;">تسجيل الدخول</button>
        
        <br><br>
        <a href="/" style="color: #6c757d; text-decoration: none; font-size: 14px;">🔙 العودة لصفحة المونيتورز</a>
    </form>

</body>
</html>
