<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - فحص الألعاب</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f8f9fa;">

    <h2>مرحباً بك في نظام الفحص اليومي</h2>
    
    <form method="POST" style="margin-top: 30px; background: white; padding: 20px; width: 90%; max-width: 400px; margin-left: auto; margin-right: auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        
        <label style="display: block; font-size: 18px; margin-bottom: 10px; text-align: right;">اسم الموظف (المونيتور):</label>
        <input type="text" name="monitor_name" required placeholder="اكتب اسمك هنا..." value="{{ session.get('monitor_name', '') }}" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box;">
        
        <label style="display: block; font-size: 18px; margin-bottom: 10px; text-align: right;">اختر المنطقة (Area):</label>
        <select name="area" required style="width: 100%; padding: 10px; margin-bottom: 30px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
            {% for area_id, area_info in areas.items() %}
                <option value="{{ area_id }}">{{ area_info.name }}</option>
            {% endfor %}
        </select>
        
        <button type="submit" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer;">دخول للفحص</button>
    </form>
    <div style="margin-top: 50px;">
        <a href="/admin_login" style="color: #adb5bd; text-decoration: none; font-size: 14px;">🔒 دخول الإدارة والصيانة</a>
    </div>
</body>
</html>
