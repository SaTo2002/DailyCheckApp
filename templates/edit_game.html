<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل اللعبة - {{ game.name }}</title>
    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --danger: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--text-main);
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            background: #f8f9fa;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: #e2e6ea;
            color: #333;
        }

        .section-card {
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checks-container .check-item {
            display: flex;
            gap: 15px;
            align-items: center;
            background: white;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .check-item input[type="text"] {
            flex-grow: 1;
        }

        .btn-add {
            background: #e9ecef;
            color: #495057;
            border: 1px solid #ced4da;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-add:hover {
            background: #dde0e3;
        }

        .btn-save {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .btn-save:hover {
            background: var(--primary-hover);
        }

        .inline-flex {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; }
            .page-header { flex-direction: column; gap: 12px; align-items: stretch; text-align: center; }
            .btn-back { text-align: center; }
            .inline-flex { flex-direction: column; align-items: stretch; }
            .check-item { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>تعديل إعدادات اللعبة: <span style="color: var(--primary-color);">{{ game.name }}</span></h1>
        <a href="/area_games/{{ game.area_id }}" class="btn-back">🔙 إلغاء والعودة</a>
    </div>

    <form action="/edit_game/{{ game.id }}" method="POST" enctype="multipart/form-data">
        
        <!-- البيانات الأساسية -->
        <div class="section-card">
            <h3 class="section-title">📌 البيانات الأساسية</h3>
            <div class="inline-flex">
                <div class="form-group" style="flex-grow: 1;">
                    <label>اسم اللعبة</label>
                    <input type="text" name="name" class="form-control" value="{{ game.name }}" required>
                </div>
                <div class="form-group">
                    <label>المنطقة</label>
                    <select name="area_id" class="form-control" id="areaSelect" data-original-area="{{ game.area_id }}">
                        {% for area in areas %}
                        <option value="{{ area.id }}" {% if area.id == game.area_id %}selected{% endif %}>{{ area.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <!-- إعدادات الملاحظات -->
        <div class="section-card">
            <h3 class="section-title">📝 إعدادات الملاحظات</h3>
            <label class="checkbox-wrapper">
                <input type="checkbox" name="notes_mandatory" {% if game.notes_mandatory %}checked{% endif %}>
                <span>الملاحظات إجبارية؟</span>
            </label>
        </div>

        <!-- إعدادات الصور -->
        <div class="section-card">
            <h3 class="section-title">📸 إعدادات الصور</h3>
            <label class="checkbox-wrapper">
                <input type="checkbox" name="allow_photos" {% if game.allow_photos %}checked{% endif %}>
                <span>تفعيل زر رفع الصور؟</span>
            </label>
            <label class="checkbox-wrapper">
                <input type="checkbox" name="requires_photo" {% if game.requires_photo %}checked{% endif %}>
                <span>الصورة إجبارية؟</span>
            </label>
        </div>

        <!-- إعدادات الخريطة -->
        <div class="section-card">
            <h3 class="section-title">🗺️ إعدادات الخريطة</h3>
            <label class="checkbox-wrapper">
                <input type="checkbox" name="has_map" {% if game.has_map %}checked{% endif %}>
                <span>تفعيل الخريطة؟</span>
            </label>
            <label class="checkbox-wrapper">
                <input type="checkbox" name="map_mandatory" {% if game.map_mandatory %}checked{% endif %}>
                <span>الرسم على الخريطة إجباري؟</span>
            </label>

            <div style="margin-top: 15px;">
                <label style="font-weight: bold; color: #495057;">تحديث صورة الخريطة (اختياري - اتركها فارغة للاحتفاظ بالقديمة):</label>
                <input type="file" name="map_image" accept="image/*" class="form-control" style="cursor: pointer;">
            </div>
        </div>

        <!-- عناصر الفحص -->
        <div class="section-card">
            <h3 class="section-title">📋 عناصر الفحص (الأسئلة)</h3>
            <div class="checks-container" id="checksContainer" data-check-count="{{ checks|length if checks else 1 }}">
                
                {% for check in checks %}
                <div class="check-item">
                    <input type="text" name="check_names[]" class="form-control" value="{{ check.name }}" placeholder="اسم العنصر (مثال: نظافة، إضاءة)">
                    <label class="checkbox-wrapper" style="margin: 0;">
                        <input type="checkbox" name="check_mandatory_{{ loop.index0 }}" {% if check.is_mandatory %}checked{% endif %}>
                        <span>إجباري؟</span>
                    </label>
                </div>
                {% endfor %}

                <!-- لو مفيش عناصر سابقة، نعرض واحد فارغ كبداية -->
                {% if not checks %}
                <div class="check-item">
                    <input type="text" name="check_names[]" class="form-control" placeholder="اسم العنصر (مثال: نظافة، إضاءة)">
                    <label class="checkbox-wrapper" style="margin: 0;">
                        <input type="checkbox" name="check_mandatory_0">
                        <span>إجباري؟</span>
                    </label>
                </div>
                {% endif %}
            </div>
            
            <button type="button" class="btn-add" onclick="addCheckItem()">+ إضافة فحص آخر</button>
        </div>

        <button type="submit" class="btn-save">💾 حفظ التعديلات</button>
    </form>
</div>

<script>
    // سكريبت لإضافة عناصر فحص جديدة ديناميكياً
    const container = document.getElementById('checksContainer');
    let checkIndex = parseInt(container.getAttribute('data-check-count'));
    
    function addCheckItem() {
        const container = document.getElementById('checksContainer');
        const newItem = document.createElement('div');
        newItem.className = 'check-item';
        newItem.innerHTML = `
            <input type="text" name="check_names[]" class="form-control" placeholder="اسم العنصر (مثال: نظافة، إضاءة)">
            <label class="checkbox-wrapper" style="margin: 0;">
                <input type="checkbox" name="check_mandatory_${checkIndex}">
                <span>إجباري؟</span>
            </label>
        `;
        container.appendChild(newItem);
        checkIndex++;
    }

    // تنبيه وتأكيد عند تغيير المنطقة التابع لها اللعبة لمنع الأخطاء
    const editForm = document.querySelector('form');
    const areaSelect = document.getElementById('areaSelect');
    if (editForm && areaSelect) {
        editForm.addEventListener('submit', function (e) {
            const originalArea = areaSelect.getAttribute('data-original-area');
            const currentArea = areaSelect.value;
            if (originalArea && currentArea && originalArea !== currentArea) {
                const confirmMove = confirm("⚠️ تحذير: لقد قمت بتغيير المنطقة التابع لها هذه اللعبة. هل أنت متأكد من رغبتك في نقل اللعبة إلى منطقة جديدة؟");
                if (!confirmMove) {
                    e.preventDefault(); // إلغاء إرسال الفورم
                }
            }
        });
    }
</script>

</body>
</html>
