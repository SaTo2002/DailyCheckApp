    <!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تعديل المنطقة: {{ area.name }}</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h2>تعديل اسم المنطقة: <span style="color: #007bff;">{{ area.name }}</span></h2>
    <a href="/manage_system" style="color: #6c757d; text-decoration: none;">إلغاء والعودة</a>
    <hr>
    
    <form method="POST" style="background:#f9f9f9; padding:20px; border-radius:8px; width: fit-content; border: 1px solid #ddd;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">اسم المنطقة الجديد:</label>
            <input type="text" name="area_name" value="{{ area.name }}" required style="padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        
        <button type="submit" style="padding:10px 20px; background:#28a745; color:white; border:none; border-radius: 4px; cursor:pointer; font-size: 16px;">حفظ التعديلات</button>
    </form>
</body>
</html>
