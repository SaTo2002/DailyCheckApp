<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل المنطقة: {{ area.name }}</title>
    <style>
        :root {
            --primary: #0d6efd;
            --success: #198754;
            --secondary: #6c757d;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 15px;
            direction: rtl;
        }

        .container {
            max-width: 550px;
            margin: 30px auto;
            background: var(--card-bg);
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            border-top: 5px solid var(--primary);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px dashed var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header h2 {
            margin: 0;
            font-size: 20px;
            color: var(--text-color);
        }

        .btn-back {
            color: var(--secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            background: #f1f5f9;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: #e2e8f0;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 15px;
            color: #334155;
        }

        .touch-input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background-color: #f8fafc;
        }

        .touch-input:focus {
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            body { padding: 12px 10px; }
            .container { margin: 10px auto; padding: 20px 16px; }
            .page-header { flex-direction: column; align-items: stretch; text-align: center; }
            .btn-back { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h2>📍 تعديل اسم المنطقة: <span style="color: var(--primary);">{{ area.name }}</span></h2>
            <a href="/manage_system" class="btn-back">🔙 إلغاء والعودة</a>
        </div>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>اسم المنطقة الجديد:</label>
                <input type="text" name="area_name" value="{{ area.name }}" class="touch-input" placeholder="اكتب اسم المنطقة..." required>
            </div>
            
            {% if area.image %}
            <div class="form-group">
                <label>🖼️ صورة غلاف المنطقة الحالية:</label>
                <img src="{{ area.image }}" alt="Cover" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; border: 2px solid var(--border-color); display: block;">
            </div>
            {% endif %}
            
            <div class="form-group">
                <label>🖼️ تحديث صورة غلاف المنطقة (اختياري):</label>
                <input type="file" name="area_image" accept="image/*" class="touch-input" style="cursor: pointer;">
            </div>
            
            <button type="submit" class="btn-submit">💾 حفظ التعديلات</button>
        </form>
    </div>
</body>
</html>
